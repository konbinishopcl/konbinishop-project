<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Konbini · Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0c0a;
    --bg-2: #161412;
    --surface: #1c1a17;
    --surface-2: #25221e;
    --line: #2a2622;
    --line-2: #3a342e;
    --ink: #f4efe6;
    --ink-2: #b8b0a2;
    --ink-3: #7a7367;
    --accent: #ff5b49;
    --accent-ink: #fff;
    --accent-2: #f3c053;
    --accent-3: #6c5cff;
    --ok: #4ec38a;
    --warn: #ffae3b;
    --err: #ff5b5b;
    --shadow: 0 30px 60px -20px rgba(0,0,0,.6), 0 8px 20px -10px rgba(0,0,0,.5);
    --r-sm: 8px; --r: 14px; --r-lg: 22px; --r-xl: 30px;
    --font-display: "Space Grotesk", "Inter", system-ui, sans-serif;
    --font-body: "Inter", system-ui, sans-serif;
    --font-jp: "Zen Kaku Gothic New", "Space Grotesk", sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
    --sidebar-w: 260px;
  }
  [data-theme="light"] {
    --bg: #f6f2ea;
    --bg-2: #efe9dd;
    --surface: #ffffff;
    --surface-2: #faf6ee;
    --line: #e6dfd0;
    --line-2: #d6cdb8;
    --ink: #14110d;
    --ink-2: #4a443a;
    --ink-3: #857d6f;
    --accent: #e8331f;
    --accent-2: #c08410;
    --accent-3: #3a2bd7;
    --shadow: 0 24px 50px -24px rgba(40,30,15,.18), 0 4px 14px -6px rgba(40,30,15,.10);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  input, textarea, select { font: inherit; color: inherit; }

  .mono { font-family: var(--font-mono); letter-spacing: .01em; }
  .display { font-family: var(--font-display); letter-spacing: -.02em; line-height: 1; font-weight: 700; }
  .jp { font-family: var(--font-jp); letter-spacing: .04em; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-3); }

  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; background: var(--surface-2); color: var(--ink-2); border: 1px solid var(--line); }
  .pill.solid { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .pill.accent { background: color-mix(in oklab, var(--accent) 15%, transparent); color: var(--accent); border-color: color-mix(in oklab, var(--accent) 30%, transparent); }
  .pill.ok { background: color-mix(in oklab, var(--ok) 15%, transparent); color: var(--ok); border-color: color-mix(in oklab, var(--ok) 30%, transparent); }
  .pill.warn { background: color-mix(in oklab, var(--warn) 15%, transparent); color: var(--warn); border-color: color-mix(in oklab, var(--warn) 30%, transparent); }
  .pill.err { background: color-mix(in oklab, var(--err) 15%, transparent); color: var(--err); border-color: color-mix(in oklab, var(--err) 30%, transparent); }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; border-radius: 999px; font-weight: 600; font-size: 13px; transition: transform .15s ease, background .2s; cursor: pointer; }
  .btn:hover { transform: translateY(-1px); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); }
  .btn.dark { background: var(--ink); color: var(--bg); }
  .btn.ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--line); }
  .btn.sm { padding: 7px 12px; font-size: 12px; }
  .btn.block { width: 100%; }

  .icon-btn { width: 38px; height: 38px; border-radius: 999px; background: var(--surface); border: 1px solid var(--line); display: inline-flex; align-items: center; justify-content: center; color: var(--ink-2); cursor: pointer; }
  .icon-btn:hover { color: var(--ink); }
  .icon-btn.sq { border-radius: 10px; width: 36px; height: 36px; }

  /* ───── layout ───── */
  .admin {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: 100vh;
  }
  aside.sidebar {
    background: var(--bg-2);
    border-right: 1px solid var(--line);
    padding: 22px 18px;
    position: sticky; top: 0; height: 100vh;
    display: flex; flex-direction: column; gap: 8px;
    overflow-y: auto;
  }
  .sb-brand { display: flex; align-items: center; gap: 10px; padding: 0 8px 22px; border-bottom: 1px solid var(--line); margin-bottom: 14px; }
  .sb-brand .mark {
    font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: -.02em;
    background: var(--accent); color: var(--accent-ink); padding: 4px 9px 5px; border-radius: 5px;
    transform: rotate(-2deg);
  }
  .sb-brand .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .18em; color: var(--ink-3); }
  .sb-brand .name { font-family: var(--font-display); font-weight: 700; font-size: 15px; }

  .sb-section { font-family: var(--font-mono); font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-3); padding: 14px 12px 6px; }
  .sb-link {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 10px;
    color: var(--ink-2); font-size: 13.5px; font-weight: 500; text-align: left;
    cursor: pointer; width: 100%;
    transition: background .15s, color .15s;
  }
  .sb-link:hover { background: var(--surface); color: var(--ink); }
  .sb-link.on { background: var(--ink); color: var(--bg); }
  .sb-link .badge {
    margin-left: auto;
    background: var(--accent); color: white;
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 999px;
    letter-spacing: .04em;
  }
  .sb-link.on .badge { background: var(--bg); color: var(--ink); }

  .sb-foot { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--line); }
  .sb-user {
    display: flex; align-items: center; gap: 10px;
    padding: 10px; border-radius: 12px; background: var(--surface);
    border: 1px solid var(--line);
  }
  .sb-user .av { width: 36px; height: 36px; border-radius: 999px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: inline-flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 12px; flex-shrink: 0; }
  .sb-user .nm { font-size: 13px; font-weight: 600; line-height: 1.2; }
  .sb-user .ro { font-size: 11px; color: var(--ink-3); font-family: var(--font-mono); letter-spacing: .05em; }

  /* ───── topbar ───── */
  main.content {
    padding: 22px 36px 60px;
    min-width: 0;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
    gap: 18px;
  }
  .breadcrumbs { font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; color: var(--ink-3); text-transform: uppercase; }
  .breadcrumbs .sep { margin: 0 8px; opacity: .5; }
  .breadcrumbs .curr { color: var(--ink); }

  .search-shell {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 999px; padding: 7px 14px;
    min-width: 320px;
  }
  .search-shell input { border: 0; background: transparent; outline: 0; flex: 1; font-size: 13px; padding: 4px 0; }
  .search-shell .kbd { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); border: 1px solid var(--line); padding: 2px 6px; border-radius: 4px; }

  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .notif { position: relative; }
  .notif .dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 999px; background: var(--accent); border: 2px solid var(--surface); }

  /* ───── page head ───── */
  .page-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; gap: 24px; flex-wrap: wrap; }
  .page-head h1 { font-family: var(--font-display); font-size: 36px; letter-spacing: -.02em; margin: 6px 0 4px; line-height: 1; }
  .page-head .sub { color: var(--ink-3); font-size: 14px; max-width: 60ch; }
  .page-head .ja { font-family: var(--font-jp); font-size: 14px; color: var(--ink-3); letter-spacing: .15em; }

  /* ───── KPI cards ───── */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .kpi {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r); padding: 18px;
    position: relative; overflow: hidden;
  }
  .kpi .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .kpi .lbl .ic { width: 26px; height: 26px; border-radius: 8px; background: var(--surface-2); display: inline-flex; align-items: center; justify-content: center; color: var(--ink-2); }
  .kpi .val { font-family: var(--font-display); font-size: 32px; font-weight: 700; letter-spacing: -.02em; line-height: 1; }
  .kpi .val .ccy { font-family: var(--font-mono); font-size: 13px; color: var(--ink-3); margin-left: 4px; letter-spacing: .05em; }
  .kpi .trend { margin-top: 8px; font-size: 12px; display: flex; align-items: center; gap: 4px; font-family: var(--font-mono); }
  .kpi .trend.up { color: var(--ok); }
  .kpi .trend.down { color: var(--err); }
  .kpi .trend .from { color: var(--ink-3); margin-left: 4px; }
  .kpi .spark { position: absolute; right: 14px; top: 18px; width: 80px; height: 30px; opacity: .6; }

  /* ───── panel ───── */
  .panel {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 22px;
  }
  .panel-head { display: flex; justify-content: space-between; align-items: end; margin-bottom: 18px; gap: 16px; }
  .panel-head h3 { font-family: var(--font-display); font-size: 18px; margin: 0; letter-spacing: -.01em; }
  .panel-head .ja { font-family: var(--font-jp); font-size: 12px; color: var(--ink-3); margin-left: 8px; letter-spacing: .15em; }
  .panel-head .more { font-size: 12px; color: var(--ink-2); display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
  .panel-head .more:hover { color: var(--accent); }

  .dash-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }
  .dash-grid-2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }

  /* chart */
  .chart-wrap { position: relative; height: 260px; }
  .chart-wrap svg { width: 100%; height: 100%; }
  .chart-legend { display: flex; gap: 14px; margin-bottom: 8px; }
  .chart-legend .lg { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-2); }
  .chart-legend .lg .sw { width: 12px; height: 12px; border-radius: 3px; }

  /* review queue */
  .review-row {
    display: flex; gap: 12px; padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .review-row:last-child { border-bottom: 0; }
  .review-row .thumb {
    width: 50px; height: 64px; border-radius: 8px;
    background: var(--surface-2); flex-shrink: 0;
    position: relative; overflow: hidden;
  }
  .review-row .info { flex: 1; min-width: 0; }
  .review-row .ttl { font-weight: 600; font-size: 13.5px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .review-row .meta { color: var(--ink-3); font-size: 11px; font-family: var(--font-mono); letter-spacing: .04em; }
  .review-row .acts { display: flex; gap: 4px; align-items: center; }
  .review-row .acts button { width: 30px; height: 30px; border-radius: 8px; background: var(--surface-2); border: 1px solid var(--line); display: inline-flex; align-items: center; justify-content: center; color: var(--ink-2); cursor: pointer; }
  .review-row .acts button.ok:hover { color: var(--ok); border-color: var(--ok); }
  .review-row .acts button.no:hover { color: var(--err); border-color: var(--err); }

  /* poster art (reused from main site) */
  .poster-art { position: absolute; inset: 0; }
  .pa-1 { background: linear-gradient(160deg, #1a0c2b 0%, #4a1860 50%, #ff3d6e 100%); }
  .pa-2 { background: linear-gradient(180deg, #0a0a0a 0%, #1d1d1d 60%, #000 100%); }
  .pa-3 { background: linear-gradient(180deg, #2b1b0a 0%, #8a4818 40%, #f59c2c 100%); }
  .pa-4 { background: linear-gradient(135deg, #ff7aaf 0%, #6c5cff 60%, #29c0ff 100%); }
  .pa-5 { background: linear-gradient(180deg, #110421 0%, #321657 50%, #ff5b1d 100%); }
  .pa-6 { background: linear-gradient(180deg, #4d091a 0%, #100404 100%); }
  .pa-7 { background: linear-gradient(135deg, #043947 0%, #0c7589 50%, #79e0ff 100%); }
  .pa-8 { background: linear-gradient(180deg, #003366 0%, #0078d4 50%, #ffd11a 100%); }
  .pa-9 { background: linear-gradient(180deg, #1b0a0a 0%, #6a1818 60%, #ff3d2e 100%); }
  .pa-10 { background: linear-gradient(135deg, #14140e 0%, #3a3a14 50%, #e3d23a 100%); }
  .pa-11 { background: linear-gradient(180deg, #170a23 0%, #6c5cff 100%); }
  .pa-12 { background: linear-gradient(160deg, #4c0a37 0%, #ff3da8 100%); }

  /* activity */
  .act-row {
    display: flex; align-items: start; gap: 12px; padding: 10px 0;
    border-bottom: 1px dashed var(--line);
  }
  .act-row:last-child { border-bottom: 0; }
  .act-row .av { width: 30px; height: 30px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; flex-shrink: 0; }
  .act-row .txt { font-size: 13px; line-height: 1.5; color: var(--ink-2); }
  .act-row .txt strong { color: var(--ink); font-weight: 600; }
  .act-row .time { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: .04em; margin-top: 2px; }

  /* category bars */
  .cat-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
  .cat-row .nm { font-size: 13px; flex: 0 0 110px; }
  .cat-row .bar { flex: 1; height: 8px; background: var(--surface-2); border-radius: 999px; overflow: hidden; position: relative; }
  .cat-row .bar .fill { height: 100%; border-radius: 999px; background: var(--accent); }
  .cat-row .num { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); min-width: 40px; text-align: right; }

  /* ───── filter bar / events page ───── */
  .filterbar {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r); padding: 14px;
    margin-bottom: 16px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .filterbar .search-shell { flex: 1; min-width: 220px; background: var(--surface-2); }
  .select {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--line);
    font-size: 13px; cursor: pointer;
    color: var(--ink-2);
  }
  .select:hover { color: var(--ink); border-color: var(--line-2); }
  .select.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .select .v { color: var(--ink); font-weight: 500; }
  .select.on .v { color: var(--bg); }

  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .chip { padding: 6px 12px; border-radius: 999px; background: var(--surface); border: 1px solid var(--line); font-size: 12px; color: var(--ink-2); display: inline-flex; align-items: center; gap: 6px; }
  .chip .x { width: 14px; height: 14px; border-radius: 999px; background: var(--surface-2); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .chip .x:hover { background: var(--accent); color: white; }
  .chip-clear { font-size: 12px; color: var(--ink-3); padding: 6px 8px; cursor: pointer; }
  .chip-clear:hover { color: var(--accent); }

  /* ───── table ───── */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); overflow: hidden;
  }
  table.evt {
    width: 100%; border-collapse: collapse;
  }
  table.evt th {
    text-align: left; padding: 14px 16px;
    font-size: 11px; font-family: var(--font-mono);
    letter-spacing: .15em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 600;
    border-bottom: 1px solid var(--line);
    background: var(--surface-2);
    white-space: nowrap;
  }
  table.evt th.sortable { cursor: pointer; }
  table.evt th.sortable:hover { color: var(--ink); }
  table.evt th .arr { opacity: .4; margin-left: 4px; }
  table.evt th.sorted .arr { opacity: 1; color: var(--accent); }
  table.evt td {
    padding: 14px 16px;
    font-size: 13.5px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  table.evt tbody tr:hover { background: var(--surface-2); }
  table.evt tbody tr:last-child td { border-bottom: 0; }

  .cell-evt { display: flex; align-items: center; gap: 12px; }
  .cell-evt .thumb { width: 48px; height: 62px; border-radius: 6px; flex-shrink: 0; position: relative; overflow: hidden; border: 1px solid var(--line); }
  .cell-evt .ti { font-weight: 600; font-size: 13.5px; line-height: 1.3; margin-bottom: 3px; max-width: 280px; }
  .cell-evt .mt { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); letter-spacing: .04em; }
  .cell-evt .mt .id { color: var(--ink-2); }

  .cell-prod .nm { font-size: 13px; font-weight: 500; }
  .cell-prod .em { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); letter-spacing: .03em; }

  .cell-date .d { font-weight: 500; font-size: 13px; }
  .cell-date .t { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); letter-spacing: .04em; margin-top: 2px; }

  .cell-price { font-family: var(--font-mono); font-weight: 500; font-size: 13px; }
  .cell-price .free { color: var(--ok); font-weight: 600; }

  .cell-sales { font-family: var(--font-mono); font-size: 13px; }
  .cell-sales .pct { font-size: 10.5px; color: var(--ink-3); margin-top: 2px; letter-spacing: .04em; }
  .cell-sales .bar { width: 80px; height: 4px; background: var(--surface-2); border-radius: 999px; overflow: hidden; margin-top: 4px; }
  .cell-sales .bar .fill { height: 100%; background: var(--accent); border-radius: 999px; }

  .row-acts { display: flex; gap: 4px; align-items: center; justify-content: flex-end; }
  .row-acts button { width: 30px; height: 30px; border-radius: 8px; background: transparent; display: inline-flex; align-items: center; justify-content: center; color: var(--ink-3); cursor: pointer; }
  .row-acts button:hover { background: var(--surface-2); color: var(--ink); }

  .ck { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--line-2); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; background: var(--surface-2); }
  .ck.on { background: var(--ink); border-color: var(--ink); color: var(--bg); }

  /* status dot */
  .stat { font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .stat .dot { width: 7px; height: 7px; border-radius: 999px; }
  .stat.rev { color: var(--warn); }
  .stat.rev .dot { background: var(--warn); box-shadow: 0 0 0 3px color-mix(in oklab, var(--warn) 18%, transparent); }
  .stat.pub { color: var(--ok); }
  .stat.pub .dot { background: var(--ok); box-shadow: 0 0 0 3px color-mix(in oklab, var(--ok) 18%, transparent); }
  .stat.rej { color: var(--err); }
  .stat.rej .dot { background: var(--err); box-shadow: 0 0 0 3px color-mix(in oklab, var(--err) 18%, transparent); }
  .stat.dr { color: var(--ink-3); }
  .stat.dr .dot { background: var(--ink-3); }
  .stat.arc { color: var(--ink-3); }
  .stat.arc .dot { background: var(--ink-3); box-shadow: 0 0 0 3px color-mix(in oklab, var(--ink-3) 18%, transparent); }

  /* bulk action bar */
  .bulkbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: color-mix(in oklab, var(--accent) 8%, var(--surface));
    border-bottom: 1px solid var(--line);
  }
  .bulkbar .ct { font-size: 13px; font-weight: 600; }
  .bulkbar .ct .n { color: var(--accent); }
  .bulkbar .acts { display: flex; gap: 8px; }

  /* ───── pagination ───── */
  .pag {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px;
    border-top: 1px solid var(--line);
    background: var(--surface-2);
  }

function seed(i) {
  const date = new Date(2025, (i * 3) % 12, ((i * 7) % 27) + 1);
  const dateStr = date.toLocaleDateString("es-CL", { day: "2-digit", month: "short", year: "numeric" }).replace(".", "").toUpperCase();
  const cat = CATS[i % CATS.length];
  const stat = STATS[Math.floor((i * 13) % STATS.length)];
  const free = i % 11 === 0;
  const basePrice = free ? 0 : [4990, 9990, 14990, 19990, 29990, 45000, 65000, 80000][i % 8];
  const stock = 100 + (i * 37) % 4000;
  const sold = Math.min(stock, Math.floor(stock * ((i * 11 % 100) / 100)));
  return {
    id: `EVT-${(2025000 + i).toString()}`,
    title: TITLES_EVT[i % TITLES_EVT.length] + (i >= TITLES_EVT.length ? ` · vol. ${Math.floor(i / TITLES_EVT.length) + 1}` : ""),

    cat,
    art: ARTS[i % ARTS.length],
    date: dateStr,
    time: ["19:00","20:30","21:00","18:00","22:00"][i % 5],
    venue: VENUES[i % VENUES.length],
    producer: PRODUCERS[i % PRODUCERS.length],
    price: basePrice,
    stock, sold,
    status: stat,
    created: `${((i * 5) % 28) + 1} ABR 2025`,
    featured: i % 9 === 0,
  };

function KpiCard({ label, value, ccy, trend, from, icon, color }) {

  return (
    <div className="kpi">
      <div className="lbl">
        <span className="ic" style={{ color: color || "var(--ink-2)" }}>{icon}</span>

      <div className="val">{value}{ccy && <span className="ccy">{ccy}</span>}</div>
      {trend && <div className={`trend ${up ? "up" : "down"}`}>{up ? "▲" : "▼"} {trend} <span className="from">vs. {from}</span></div>}
      <svg className="spark" viewBox="0 0 80 30" preserveAspectRatio="none">
        <polyline fill="none" stroke={color || "var(--accent)"} strokeWidth="1.5"
          points={Array.from({ length: 14 }, (_, i) => `${i * 6},${20 - Math.sin((i + (label.length % 5)) * .7) * 8 - (i * 0.6)}`).join(" ")} />

}

/* ───────── chart ───────── */
function RevenueChart() {
  const months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const sales = [12,18,14,22,28,34,30,42,48,52,58,64];
  const tix   = [ 8,12, 9,15,19,24,21,30,36,38,42,48];
  const max = 70;
  const W = 700, H = 240, P = 30;
  const xs = i => P + (i * (W - P * 2) / (months.length - 1));
  const ys = v => H - P - (v / max) * (H - P * 2);
  const path = (data) => data.map((v, i) => `${i === 0 ? "M" : "L"} ${xs(i)} ${ys(v)}`).join(" ");
  const areaPath = (data) => path(data) + ` L ${xs(months.length - 1)} ${H - P} L ${xs(0)} ${H - P} Z`;
  return (
    <div className="chart-wrap">
      <svg viewBox={`0 0 ${W} ${H}`}>
        <defs>
          <linearGradient id="gr1" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor="var(--accent)" stopOpacity=".3"/>
            <stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/>
          </linearGradient>
        </defs>
        {[0,1,2,3,4].map(i => (
          <line key={i} x1={P} x2={W-P} y1={P + i*(H-P*2)/4} y2={P + i*(H-P*2)/4} stroke="var(--line)" strokeDasharray="3 4"/>
        ))}
        <path d={areaPath(sales)} fill="url(#gr1)" />
        <path d={path(sales)} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round"/>
        <path d={path(tix)} fill="none" stroke="var(--accent-3)" strokeWidth="2" strokeDasharray="5 4" strokeLinecap="round"/>
        {sales.map((v, i) => (
          <circle key={i} cx={xs(i)} cy={ys(v)} r="3" fill="var(--bg)" stroke="var(--accent)" strokeWidth="2"/>
        ))}
        {months.map((m, i) => (
          <text key={i} x={xs(i)} y={H-8} textAnchor="middle" fontSize="10" fill="var(--ink-3)" fontFamily="var(--font-mono)" letterSpacing=".05em">{m.toUpperCase()}</text>
        ))}
        {[0,1,2,3,4].map(i => (
          <text key={i} x={P-8} y={P + i*(H-P*2)/4 + 4} textAnchor="end" fontSize="10" fill="var(--ink-3)" fontFamily="var(--font-mono)">{Math.round(max - i*max/4)}M</text>
        ))}
      </svg>
    </div>
  );
}

/* ───────── events view ───────── */
function EventsView() {
  const [search, setSearch] = useState("");
  const [statFilter, setStatFilter] = useState("all");
  const [catFilter, setCatFilter] = useState("all");
  const [priceFilter, setPriceFilter] = useState("all");
  const [dateFilter, setDateFilter] = useState("all");
  const [sort, setSort] = useState({ k: "created", d: "desc" });
  const [selected, setSelected] = useState(new Set());
  const [page, setPage] = useState(1);
  const [perPage, setPerPage] = useState(10);
  const [openMenu, setOpenMenu] = useState(null);

  const toggleSort = (k) => {
    setSort(s => s.k === k ? { k, d: s.d === "asc" ? "desc" : "asc" } : { k, d: "asc" });
  };

  const filtered = useMemo(() => {
    let res = ALL_EVENTS;
    if (search) {
      const q = search.toLowerCase();
      res = res.filter(e => e.title.toLowerCase().includes(q) || e.id.toLowerCase().includes(q) || e.producer.nm.toLowerCase().includes(q));
    }
    if (statFilter !== "all") res = res.filter(e => e.status === statFilter);
    if (catFilter !== "all") res = res.filter(e => e.cat === catFilter);
    if (priceFilter === "free") res = res.filter(e => e.price === 0);
    if (priceFilter === "paid") res = res.filter(e => e.price > 0);
    // date filter is decorative for this prototype

    res = [...res].sort((a, b) => {
      const dir = sort.d === "asc" ? 1 : -1;
      if (sort.k === "title") return a.title.localeCompare(b.title) * dir;
      if (sort.k === "price") return (a.price - b.price) * dir;
      if (sort.k === "sold") return (a.sold - b.sold) * dir;
      if (sort.k === "date") return a.id.localeCompare(b.id) * dir;
      return a.id.localeCompare(b.id) * dir;
    });
    return res;
  }, [search, statFilter, catFilter, priceFilter, dateFilter, sort]);

  useEffect(() => { setPage(1); }, [search, statFilter, catFilter, priceFilter, dateFilter, perPage]);

  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / perPage));
  const pageStart = (page - 1) * perPage;
  const pageItems = filtered.slice(pageStart, pageStart + perPage);

  const toggleAll = () => {
    if (pageItems.every(e => selected.has(e.id))) {
      const ns = new Set(selected); pageItems.forEach(e => ns.delete(e.id)); setSelected(ns);
    } else {
      const ns = new Set(selected); pageItems.forEach(e => ns.add(e.id)); setSelected(ns);
    }
  };
  const toggleOne = (id) => {
    const ns = new Set(selected); ns.has(id) ? ns.delete(id) : ns.add(id); setSelected(ns);
  };
  const allOn = pageItems.length > 0 && pageItems.every(e => selected.has(e.id));

  // active filter chips
  const activeChips = [];
  if (statFilter !== "all") activeChips.push({ k: "stat", lbl: STAT_LABEL[statFilter], onX: () => setStatFilter("all") });
  if (catFilter !== "all") activeChips.push({ k: "cat", lbl: catFilter, onX: () => setCatFilter("all") });
  if (priceFilter !== "all") activeChips.push({ k: "price", lbl: priceFilter === "free" ? "Gratis" : "De pago", onX: () => setPriceFilter("all") });
  if (dateFilter !== "all") activeChips.push({ k: "date", lbl: dateFilter, onX: () => setDateFilter("all") });

  // pagination numbers
  const pageNums = useMemo(() => {
    const out = [];
    const push = (v) => out.push(v);
    if (totalPages <= 7) {
      for (let i = 1; i <= totalPages; i++) push(i);
    } else {
      push(1);
      if (page > 3) push("…");
      for (let i = Math.max(2, page - 1); i <= Math.min(totalPages - 1, page + 1); i++) push(i);
      if (page < totalPages - 2) push("…");
      push(totalPages);
    }
    return out;
  }, [page, totalPages]);

  return (
    <>
      <div className="page-head">
        <div>
          <div className="eyebrow">CATÁLOGO · イベント</div>
          <h1>Eventos <span style={{ color: "var(--accent)" }}>.</span></h1>
          <div className="sub">Administra publicaciones, revisa solicitudes, edita información y controla la visibilidad pública.</div>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button className="btn ghost sm">{Ic.dl} Exportar CSV</button>
          <button className="btn primary sm">{Ic.plus} Crear evento</button>
        </div>
      </div>

      <div className="filterbar">
        <div className="search-shell">
          {Ic.search}
          <input
            placeholder="Buscar por título, ID o productor…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          {search && <button className="icon-btn" style={{ width: 24, height: 24 }} onClick={() => setSearch("")}>{Ic.close}</button>}
        </div>
        <FilterSelect label="Estado" value={statFilter} setValue={setStatFilter} options={[
          { v: "all", l: "Todos" },
          ...STATS.map(s => ({ v: s, l: STAT_LABEL[s] }))
        ]} />
        <FilterSelect label="Categoría" value={catFilter} setValue={setCatFilter} options={[
          { v: "all", l: "Todas" },
          ...CATS.map(c => ({ v: c, l: c }))
        ]} />
        <FilterSelect label="Precio" value={priceFilter} setValue={setPriceFilter} options={[
          { v: "all", l: "Todos" },
          { v: "free", l: "Gratuitos" },
          { v: "paid", l: "Pagados" },
        ]} />
        <FilterSelect label="Fecha" value={dateFilter} setValue={setDateFilter} options={[
          { v: "all", l: "Cualquiera" },
          { v: "hoy", l: "Hoy" },
          { v: "semana", l: "Esta semana" },
          { v: "mes", l: "Este mes" },
          { v: "futuros", l: "Próximos" },
        ]} />
        <button className="btn ghost sm" style={{ marginLeft: "auto" }}>{Ic.flt} Más filtros</button>
      </div>

      {activeChips.length > 0 && (
        <div className="chips">
          <span className="eyebrow" style={{ alignSelf: "center", marginRight: 4 }}>FILTROS ACTIVOS</span>
          {activeChips.map(c => (
            <span key={c.k} className="chip">
              {c.lbl}
              <span className="x" onClick={c.onX}>{Ic.close}</span>
            </span>
          ))}
          <span className="chip-clear" onClick={() => { setStatFilter("all"); setCatFilter("all"); setPriceFilter("all"); setDateFilter("all"); }}>Limpiar todo</span>
        </div>
      )}

      <div className="table-wrap">
        {selected.size > 0 && (
          <div className="bulkbar">
            <div className="ct"><span className="n">{selected.size}</span> evento{selected.size !== 1 ? "s" : ""} seleccionado{selected.size !== 1 ? "s" : ""}</div>
            <div className="acts">
              <button className="btn ghost sm">{Ic.check} Aprobar</button>
              <button className="btn ghost sm">{Ic.x} Rechazar</button>
              <button className="btn ghost sm">{Ic.dl} Exportar</button>
              <button className="btn ghost sm" style={{ color: "var(--err)" }}>{Ic.trash} Archivar</button>
              <button className="btn ghost sm" onClick={() => setSelected(new Set())}>Cancelar</button>
            </div>
          </div>
        )}

        {pageItems.length === 0 ? (
          <div className="empty">
            <div className="ic">{Ic.search}</div>
            <h3>Sin resultados</h3>
            <p>No encontramos eventos con esos filtros. Prueba limpiar la búsqueda o cambiar la categoría.</p>
          </div>
        ) : (
        <table className="evt">
          <thead>
            <tr>
              <th style={{ width: 36 }}>
                <div className={`ck ${allOn ? "on" : ""}`} onClick={toggleAll}>{allOn && Ic.check}</div>
              </th>
              <SortTh k="title" cur={sort} onClick={toggleSort}>Evento</SortTh>
              <th>Productor</th>
              <SortTh k="date" cur={sort} onClick={toggleSort}>Fecha & venue</SortTh>
              <SortTh k="price" cur={sort} onClick={toggleSort}>Precio</SortTh>
              <SortTh k="sold" cur={sort} onClick={toggleSort}>Ventas</SortTh>
              <th>Estado</th>
              <th style={{ textAlign: "right" }}></th>
            </tr>
          </thead>
          <tbody>
            {pageItems.map((e, i) => {
              const sel = selected.has(e.id);
              const pct = e.stock === 0 ? 0 : Math.round((e.sold / e.stock) * 100);
              return (
                <tr key={e.id}>
                  <td>
                    <div className={`ck ${sel ? "on" : ""}`} onClick={() => toggleOne(e.id)}>{sel && Ic.check}</div>
                  </td>
                  <td>
                    <div className="cell-evt">
                      <div className="thumb"><div className={`poster-art ${e.art}`}/></div>
                      <div>
                        <div className="ti">{e.title}{e.featured && <span className="pill accent" style={{ marginLeft: 8, padding: "2px 7px", fontSize: 9.5 }}>★ DESTACADO</span>}</div>
                        <div className="mt"><span className="id">{e.id}</span> · {e.cat.toUpperCase()} · {e.ja}</div>
                      </div>
                    </div>
                  </td>
                  <td>
                    <div className="cell-prod">
                      <div className="nm">{e.producer.nm}</div>
                      <div className="em">{e.producer.em}</div>
                    </div>
                  </td>
                  <td>
                    <div className="cell-date">
                      <div className="d">{e.date}</div>
                      <div className="t">{e.time} · {e.venue}</div>
                    </div>
                  </td>
                  <td>
                    <div className="cell-price">
                      {e.price === 0 ? <span className="free">Gratis</span> : <>${fmt(e.price)} <span style={{ color: "var(--ink-3)" }}>CLP</span></>}
                    </div>
                  </td>
                  <td>
                    <div className="cell-sales">
                      <div>{fmt(e.sold)} <span style={{ color: "var(--ink-3)" }}>/ {fmt(e.stock)}</span></div>
                      <div className="pct">{pct}% vendido</div>
                      <div className="bar"><div className="fill" style={{ width: `${pct}%`, background: pct > 80 ? "var(--ok)" : pct > 40 ? "var(--accent)" : "var(--warn)" }}/></div>
                    </div>
                  </td>
                  <td>
                    <div className={`stat ${e.status}`}>
                      <span className="dot"/>
                      {STAT_LABEL[e.status]}
                    </div>
                  </td>
                  <td>
                    <div className="row-acts" style={{ position: "relative" }}>
                      <button title="Ver">{Ic.eye}</button>
                      <button title="Editar">{Ic.edit}</button>
                      <button title="Más" onClick={() => setOpenMenu(openMenu === e.id ? null : e.id)}>{Ic.dots}</button>
                      {openMenu === e.id && (
                        <div className="menu-pop" onMouseLeave={() => setOpenMenu(null)}>
                          <button>{Ic.eye} Ver en sitio público</button>
                          <button>{Ic.edit} Editar publicación</button>
                          {e.status === "rev" && <>
                            <div className="sep"/>
                            <button style={{ color: "var(--ok)" }}>{Ic.check} Aprobar y publicar</button>
                            <button style={{ color: "var(--err)" }}>{Ic.x} Rechazar</button>
                          </>}
                          <button>★ {e.featured ? "Quitar destacado" : "Marcar destacado"}</button>
                          <button>{Ic.dl} Duplicar</button>
                          <div className="sep"/>
                          <button className="danger">{Ic.trash} Archivar</button>
                        </div>
                      )}
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        )}

        <div className="pag">
          <div style={{ display: "flex", gap: 18, alignItems: "center" }}>
            <div className="info">
              Mostrando <strong>{total === 0 ? 0 : pageStart + 1}</strong>–<strong>{Math.min(pageStart + perPage, total)}</strong> de <strong>{total}</strong> resultados
            </div>
            <div className="per-page">
              Por página:
              <select value={perPage} onChange={e => setPerPage(+e.target.value)}>
                <option>10</option><option>20</option><option>50</option><option>100</option>
              </select>
            </div>
          </div>
          <div className="nums">
            <button disabled={page === 1} onClick={() => setPage(page - 1)}>{Ic.chevL}</button>
            {pageNums.map((n, i) => n === "…" ? (
              <span key={i} className="ell">…</span>
            ) : (
              <button key={i} className={n === page ? "on" : ""} onClick={() => setPage(n)}>{n}</button>
            ))}
            <button disabled={page === totalPages} onClick={() => setPage(page + 1)}>{Ic.chevR}</button>
          </div>
        </div>
      </div>
    </>
  );
}

function SortTh({ k, cur, onClick, children }) {
  const sorted = cur.k === k;
  return (
    <th className={`sortable ${sorted ? "sorted" : ""}`} onClick={() => onClick(k)}>
      {children}<span className="arr">{sorted ? (cur.d === "asc" ? "↑" : "↓") : "↕"}</span>
    </th>
  );
}

function FilterSelect({ label, value, setValue, options }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  const curr = options.find(o => o.v === value) || options[0];
  return (
    <div ref={ref} style={{ position: "relative" }}>
      <button className={`select ${value !== "all" ? "on" : ""}`} onClick={() => setOpen(o => !o)}>
        <span style={{ color: "inherit", opacity: .75 }}>{label}:</span>
        <span className="v">{curr.l}</span>
        {Ic.chevD}
      </button>
      {open && (
        <div className="menu-pop" style={{ left: 0, right: "auto", minWidth: 180 }}>
          {options.map(o => (
            <button key={o.v} onClick={() => { setValue(o.v); setOpen(false); }} style={value === o.v ? { background: "var(--surface-2)", color: "var(--ink)" } : {}}>
              {value === o.v && <span style={{ color: "var(--accent)" }}>{Ic.check}</span>}
              <span style={{ marginLeft: value === o.v ? 0 : 19 }}>{o.l}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

      <main className="content">
        <Topbar crumbs={crumbs} />
        {view === "dashboard" && <DashboardView />}
        {view === "events" && <EventsView />}
        {view === "users" && <PlaceholderView title="Usuarios" ja="ユーザー" subtitle="Gestiona organizadores, asistentes y permisos." />}
        {view === "payments" && <PlaceholderView title="Pagos & ventas" ja="決済" subtitle="Transacciones, payouts a organizadores y reportes financieros." />}
        {view === "categories" && <PlaceholderView title="Categorías" ja="カテゴリ" subtitle="Crea, edita y ordena las categorías del marketplace." />}
        {view === "reports" && <PlaceholderView title="Reportes" ja="レポート" subtitle="Reportes detallados de ventas, asistencia y comportamiento." />}
        {view === "logs" && <PlaceholderView title="Logs & auditoría" ja="監査ログ" subtitle="Historial completo de acciones administrativas." />}
        {view === "settings" && <PlaceholderView title="Configuración" ja="設定" subtitle="Branding, pasarelas de pago, integraciones y políticas." />}
        {view === "help" && <PlaceholderView title="Ayuda & documentación" ja="ヘルプ" subtitle="Guías, FAQ y soporte técnico." />}
      </main>
    </div>
  );
}

function App() {
  return (
    <ThemeProvider>
      <RouterProvider>
        <Shell />
      </RouterProvider>
    </ThemeProvider>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
