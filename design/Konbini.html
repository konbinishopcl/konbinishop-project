            <strong style={{ color: "var(--ink)" }}>{allItems.length} eventos</strong> · explora y compra tu entrada en segundos.
          </p>
        </div>
        <div className="jp" style={{ fontSize: 80, color: "var(--ink-3)", opacity: .3, lineHeight: .9, fontWeight: 900 }}>{meta.ja}</div>
      </div>

      <div className="fbar-sticky">
        <div className="fbar-inner">
          <div className="group">
            {["Hoy", "Esta semana"].map(f => (
              <button key={f} className={`sel ${quick === f ? "on" : ""}`} onClick={() => setQuick(quick === f ? null : f)}>{f}</button>
            ))}
          </div>
          <div className="vline"></div>
          <div className="group">
            <div style={{ position: "relative" }}>
              <button className={`sel ${open === "date" ? "on" : ""} ${dateRange ? "on" : ""}`} onClick={() => setOpen(open === "date" ? null : "date")} title="Rango de fechas">
                <span style={{ display: "inline-flex", marginRight: 6 }}>{Ic.cal}</span><strong style={{ fontWeight: 600 }}>{dateRange || "Fecha"}</strong> {Ic.chev}
              </button>
              {open === "date" && (
                <div className="menu" style={{ top: 44, left: 0, minWidth: 280, padding: 14 }} onMouseLeave={() => setOpen(null)}>
                  <div style={{ fontSize: 12, color: "var(--ink-3)", marginBottom: 10, fontFamily: "var(--font-mono)", letterSpacing: ".08em" }}>SELECCIONA UN RANGO</div>

                    <div className="field" style={{ margin: 0 }}>
                      <label style={{ fontSize: 11, marginBottom: 4 }}>Desde</label>
                      <input type="date" />
                    </div>
                    <div className="field" style={{ margin: 0 }}>
                      <label style={{ fontSize: 11, marginBottom: 4 }}>Hasta</label>
                      <input type="date" />
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 8, marginTop: 12 }}>

/* ───────────────── search ───────────────── */
function SearchPage() {
  const { nav } = useRouter();
  const [q, setQ] = useState("");
  const [tab, setTab] = useState("all");
  const norm = s => (s || "").toLowerCase();
  const qq = norm(q);
  const matchedEvents = EVENTS.filter(e => !qq || norm(e.title).includes(qq) || norm(e.cat).includes(qq) || norm(e.place).includes(qq));
  const matchedArticles = ARTICLES.filter(a => !qq || norm(a.title).includes(qq) || norm(a.cat).includes(qq) || (a.tags || []).some(t => norm(t).includes(qq)));
  const list = tab === "events" ? matchedEvents.map(x => ({ ...x, kind: "event" })) :
               tab === "news"   ? matchedArticles.map(x => ({ ...x, kind: "article" })) :
               [...matchedEvents.map(x => ({ ...x, kind: "event" })), ...matchedArticles.map(x => ({ ...x, kind: "article" }))];
  return (
    <main className="container search-shell">
      <div className="eyebrow">BUSCAR · 検索</div>
      <h1>¿Qué buscas?</h1>
      <div className="search-input">
        {Ic.search}
        <input autoFocus placeholder="Animes, conciertos, conventions, artículos…" value={q} onChange={e => setQ(e.target.value)} />
        <kbd>ESC</kbd>
      </div>
      <div className="search-tabs">
        <button className={tab === "all" ? "on" : ""} onClick={() => setTab("all")}>Todo <span className="ct">{matchedEvents.length + matchedArticles.length}</span></button>
        <button className={tab === "events" ? "on" : ""} onClick={() => setTab("events")}>Eventos <span className="ct">{matchedEvents.length}</span></button>
        <button className={tab === "news" ? "on" : ""} onClick={() => setTab("news")}>Noticias <span className="ct">{matchedArticles.length}</span></button>
      </div>
      {list.length === 0 ? (
        <div style={{ padding: "60px 0", textAlign: "center", color: "var(--ink-3)" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🍙</div>
          <div style={{ fontSize: 18, color: "var(--ink-2)", marginBottom: 6 }}>No encontramos nada para "{q}"</div>
          <div style={{ fontSize: 14 }}>Prueba con otra palabra o explora por categoría.</div>
        </div>
      ) : list.map((it, i) => (
        <div key={(it.kind) + "-" + (it.id || i)} className="search-row" onClick={() => nav(it.kind === "event" ? "event" : "article", { id: it.id })}>
          <div className="thumb"><div className={`pic poster-art ${it.art}`} /></div>
          <div className="info">
            <span className={`badge ${it.kind === "event" ? "ev" : "no"}`}>{it.kind === "event" ? "EVENTO" : "NOTICIA"}</span>
            <div className="t">{it.title}</div>
            <div className="m">{it.kind === "event" ? `${it.cat} · ${it.date} · ${it.place}` : `${it.cat} · ${it.date} · ${it.reading} lectura`}</div>
          </div>
          {Ic.arrow}
        </div>
      ))}
    </main>
  );
}

  if (q.trim()) entries = entries.filter(([t]) => t.toLowerCase().includes(q.toLowerCase()));
  if (sort === "Más usados") entries.sort((a, b) => b[1] - a[1]);
  else if (sort === "A-Z") entries.sort((a, b) => a[0].localeCompare(b[0]));
  else if (sort === "Recientes") entries.sort((a, b) => a[0].length - b[0].length);

  // Tag cloud sizing based on rank
  const max = entries[0]?.[1] || 1;
  const min = entries[entries.length - 1]?.[1] || 1;
  const sizeOf = c => {
    if (max === min) return 18;
    return 14 + Math.round(((c - min) / (max - min)) * 22); // 14..36px
  };

  return (
    <main className="container">
      <a onClick={() => nav("news")} style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "var(--ink-3)", fontSize: 13, marginTop: 24, marginBottom: 4, cursor: "pointer" }}>{Ic.chevL} Volver a noticias</a>
      <div style={{ margin: "8px 0 36px" }}>
        <div className="eyebrow">NOTICIAS · タグ</div>
        <h1 className="display" style={{ fontSize: 80, margin: "12px 0 8px", letterSpacing: "-.035em", lineHeight: .95 }}>Tags<span style={{ color: "var(--accent)" }}>.</span></h1>
        <p style={{ color: "var(--ink-2)", margin: 0, maxWidth: "62ch", fontSize: 16 }}>
          <strong style={{ color: "var(--ink)" }}>{entries.length} tags activos</strong> · generados por IA al aprobar artículos. Hacer clic abre el archivo de noticias con ese tag.
        </p>
      </div>

      <div className="fbar-sticky">
        <div className="fbar-inner" style={{ gap: 12 }}>
          <div className="search-input" style={{ padding: "8px 16px", margin: 0, flex: 1, minWidth: 280, background: "transparent", border: 0 }}>
            {Ic.search}
            <input placeholder="Buscar tag…" value={q} onChange={e => setQ(e.target.value)} style={{ padding: 0, background: "transparent" }} />
            {q && <button onClick={() => setQ("")} className="icon-btn" style={{ width: 28, height: 28 }}>{Ic.close}</button>}
          </div>
          <div className="group" style={{ marginLeft: "auto" }}>
            {["Más usados", "A-Z", "Recientes"].map(s => (
              <button key={s} className={`sel ${sort === s ? "on" : ""}`} onClick={() => setSort(s)}>{s}</button>
            ))}
          </div>
        </div>
      </div>

      {/* TAG CLOUD */}
      <section style={{ padding: 36, border: "1px solid var(--line)", borderRadius: "var(--r-xl)", marginBottom: 32 }}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: "14px 18px", alignItems: "baseline" }}>
          {entries.map(([t, c]) => (
            <button key={t} onClick={() => nav("tag", { tag: t })} style={{ display: "inline-flex", alignItems: "baseline", gap: 6, padding: "4px 0", color: "var(--ink)", background: "transparent", border: 0, cursor: "pointer", transition: "color .12s, transform .12s", fontFamily: "var(--font-display)", fontWeight: 600, fontSize: sizeOf(c), letterSpacing: "-.01em", lineHeight: 1.1 }} onMouseOver={e => { e.currentTarget.style.color = "var(--accent)"; e.currentTarget.style.transform = "translateY(-2px)"; }} onMouseOut={e => { e.currentTarget.style.color = "var(--ink)"; e.currentTarget.style.transform = ""; }}>
              <span style={{ color: "var(--accent)" }}>#</span>{t}
              <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--ink-3)", fontWeight: 500, letterSpacing: ".05em", marginLeft: 2 }}>{c}</span>
            </button>
          ))}
        </div>
      </section>

      {entries.length === 0 && (
        <div className="acc-empty" style={{ margin: "40px 0 60px" }}>
          <div className="ic"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></div>
          <h3>Sin tags que coincidan con "{q}"</h3>
          <button className="btn ghost" onClick={() => setQ("")}>Limpiar búsqueda</button>
        </div>
      )}
    </main>
  );
}

/* ───────────────── news category list ───────────────── */
function NewsCategoryPage({ cat }) {
  const { route, nav } = useRouter();

  const [type, setType] = useState("Todos");

  const [perPage, setPerPage] = useState(12);

  const sorts = ["Más recientes", "Más leídas", "A-Z"];

        {icon}<strong style={{ fontWeight: 600 }}>{value}</strong> {Ic.chev}
      </button>
      {open === id && (
        <div className="menu" style={{ top: 44, left: 0, minWidth: 200 }} onMouseLeave={() => setOpen(null)}>

            <button key={o} onClick={() => { onPick(o); setOpen(null); }} style={value === o ? { background: "var(--surface-2)", color: "var(--ink)" } : null}>

          ))}

  const clearAll = () => { setType("Todos"); setSponsored("Todos"); setPeriod(null); setQ(""); };

    <main className="container">
      <a onClick={() => nav("news")} style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "var(--ink-3)", fontSize: 13, marginTop: 24, marginBottom: 4, cursor: "pointer" }}>{Ic.chevL} Volver a todas las noticias</a>
      <div style={{ margin: "8px 0 24px", display: "flex", justifyContent: "space-between", alignItems: "end", flexWrap: "wrap", gap: 16 }}>
        <div>
          <div className="eyebrow">NOTICIAS · {cMeta?.ja || ""}</div>
          <h1 className="display" style={{ fontSize: 64, margin: "12px 0 6px" }}>{cat}<span style={{ color: "var(--accent)" }}>.</span></h1>
          <p style={{ color: "var(--ink-2)", margin: 0, maxWidth: "60ch" }}>
            <strong style={{ color: "var(--ink)" }}>{allItems.length} artículos</strong> · cobertura editorial de {cat.toLowerCase()} en Konbini.
          </p>
        </div>
        <div className="jp" style={{ fontSize: 80, color: "var(--ink-3)", opacity: .3, lineHeight: .9, fontWeight: 900 }}>{cMeta?.ja || "ニュース"}</div>
      </div>

      <div className="fbar-sticky">
        <div className="fbar-inner">
          <div className="group">
            {["Hoy", "Esta semana"].map(p => (
              <button key={p} className={`sel ${period === p ? "on" : ""}`} onClick={() => setPeriod(period === p ? null : p)}>{p}</button>
            ))}
          </div>
          <div className="vline"></div>
          <div className="group">
            <Pop id="type" label="Tipo" options={types} value={type} onPick={setType} icon={<span style={{ display: "inline-flex", marginRight: 6 }}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 6h16M4 12h12M4 18h8"/></svg></span>} dflt="Todos" />
            <Pop id="sponsored" label="Origen" options={sponsoredOpts} value={sponsored} onPick={setSponsored} icon={<span style={{ display: "inline-flex", marginRight: 6, fontWeight: 700 }}>✦</span>} dflt="Todos" />
            {activeCount > 0 && <button className="sel" style={{ color: "var(--accent)" }} onClick={clearAll}>✕ Limpiar ({activeCount})</button>}
          </div>
          <div className="group" style={{ marginLeft: "auto" }}>
            <div style={{ position: "relative" }}>
              <button className={`sel ${searchOpen ? "on" : ""} ${q ? "on" : ""}`} onClick={() => setSearchOpen(o => !o)} title="Buscar">
                <span style={{ display: "inline-flex", marginRight: 6 }}>{Ic.search}</span>
                <strong style={{ fontWeight: 600 }}>{q || "Buscar"}</strong>
              </button>
              {searchOpen && (
                <div className="menu" style={{ top: 44, right: 0, left: "auto", minWidth: 280, padding: 12 }} onMouseLeave={() => setSearchOpen(false)}>
                  <div className="search-input" style={{ padding: "10px 14px", margin: 0 }}>
                    {Ic.search}
                    <input autoFocus placeholder={`Buscar en ${cat}…`} value={q} onChange={e => setQ(e.target.value)} style={{ padding: 0, background: "transparent" }} />

                </div>
              )}
            </div>
            <div style={{ display: "inline-flex", border: "1px solid var(--line)", borderRadius: 999, padding: 3, background: "var(--surface)" }}>
              <button className={`sel ${view === "grid" ? "on" : ""}`} onClick={() => setView("grid")} title="Grilla" style={{ border: 0, padding: "6px 10px" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              </button>
              <button className={`sel ${view === "list" ? "on" : ""}`} onClick={() => setView("list")} title="Lista" style={{ border: 0, padding: "6px 10px" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
              </button>
            </div>
            <Pop id="sort" label="Ordenar" options={sorts} value={sort} onPick={setSort} icon={<span style={{ display: "inline-flex", marginRight: 6 }}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 6h13M3 12h9M3 18h5M17 8V4l3 3M17 16v4l3-3"/></svg></span>} dflt="Más recientes" />
          </div>
        </div>
      </div>

      {allItems.length === 0 ? (
        <div className="acc-empty" style={{ margin: "40px 0 60px" }}>
          <div className="ic"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></div>
          <h3>No hay artículos con esos filtros</h3>
          <p>Prueba ampliando los filtros o quitando alguno.</p>
          <button className="btn ghost" onClick={clearAll}>Limpiar filtros</button>
        </div>
      ) : <>
        {view === "grid" ? (
          <div className="card-grid" style={{ marginTop: 16, marginBottom: 24 }}>
            {allItems.map((a, i) => <ArticleCard key={a.id + "-" + i} a={a} onOpen={x => nav("article", { id: x.id })} />)}
          </div>
        ) : (
          <div className="list-grid">
            {allItems.map((a, i) => (
              <div key={a.id + "-" + i} className="list-row" onClick={() => nav("article", { id: a.id })}>
                <div className="l-img">
                  <div className={`pic poster-art ${a.art}`} />
                  <span className="cat-tag">{a.cat.toUpperCase()}</span>
                </div>
                <div className="l-info">
                  <div className="l-date">{a.date} · {a.reading} lectura</div>

                  <div className="l-place" style={{ color: "var(--ink-2)", fontSize: 14, marginBottom: 0 }}>{a.excerpt}</div>
                  <div className="l-orgs" style={{ marginTop: 8 }}>

                <span style={{ color: "var(--ink-3)" }}>{Ic.arrow}</span>

        <div className="pag-bar">
          <div className="pag-info">
            <span>Mostrando <strong style={{ color: "var(--ink)" }}>{(page - 1) * perPage + 1}–{Math.min(page * perPage, allItems.length * 4)}</strong> de <strong style={{ color: "var(--ink)" }}>{allItems.length * 4}</strong> artículos</span>
            <span style={{ color: "var(--line-2)" }}>·</span>
            <span className="ips">
              <span>Mostrar</span>
              <select value={perPage} onChange={e => { setPerPage(+e.target.value); setPage(1); }}>

                <option value="24">24</option>
                <option value="48">48</option>

              <span>por página</span>

              <button key={p} className={page === p ? "on" : ""} onClick={() => setPage(p)}>{p}</button>

            <button onClick={() => setPage(p => p + 1)}>{Ic.chevR}</button>
          </div>
        </div>
      </>}
    </main>
  );
}

/* ───────────────── article detail ───────────────── */
function ArticlePage() {
  const { route, nav } = useRouter();
  const a = ARTICLES.find(x => x.id === route.params?.id) || ARTICLES[0];
  const toast = useToast();
  const seed = (a.id || "").charCodeAt(2) || 7;
  const [likes, setLikes] = useState(120 + seed * 13);
  const [liked, setLiked] = useState(false);
  const toggleLike = () => {
    setLiked(l => {
      const next = !l;
      setLikes(c => c + (next ? 1 : -1));
      if (next) toast?.ok("¡Te gustó este artículo!"); else toast?.info("Like quitado");
      return next;
    });
  };
  const linkedEvent = a.relatedEventId ? EVENTS.find(e => e.id === a.relatedEventId) : null;
  const orgRel = EVENTS.filter(e => e.id !== a.relatedEventId).slice(0, 3);
  const moreArt = ARTICLES.filter(x => x.id !== a.id).slice(0, 3);
  return (
    <main className="container art-shell">
      <a className="art-back" onClick={() => nav("news")} style={{ cursor: "pointer" }}>{Ic.chevL} Volver a noticias</a>

      <div className="art-grid">
        <div>
          <div className="art-head" style={{ maxWidth: "none" }}>
            <div className="cat">
              <span>{a.cat}</span>
              {a.sponsored && <span style={{ background: "rgba(255,255,255,.06)", padding: "4px 10px", borderRadius: 999, color: "var(--ink-2)", letterSpacing: ".1em" }}>ARTÍCULO PATROCINADO</span>}
            </div>
            <h1>{a.title}</h1>
            <p className="lede">{a.excerpt}</p>
            <div className="art-meta-row">
              <div className="by">
                <div className="av">{a.author.split(" ").map(w => w[0]).slice(0, 2).join("")}</div>
                <div>
                  <div style={{ fontWeight: 600, color: "var(--ink)" }}>{a.author}</div>
                  <div style={{ fontSize: 12, color: "var(--ink-3)" }}>{a.date} · {a.reading} lectura</div>
                </div>
              </div>
              <div className="share-grp">
                <button onClick={toggleLike} title={liked ? "Quitar like" : "Me gusta"} style={{ display: "inline-flex", alignItems: "center", gap: 7, padding: "0 14px", height: 36, borderRadius: 999, background: liked ? "var(--accent)" : "var(--surface)", border: "1px solid " + (liked ? "var(--accent)" : "var(--line)"), color: liked ? "#fff" : "var(--ink)", fontFamily: "var(--font-mono)", fontSize: 12, fontWeight: 700, cursor: "pointer", transition: "background .15s, transform .1s" }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill={liked ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 22V11"/><path d="M2 13a2 2 0 0 1 2-2h3v11H4a2 2 0 0 1-2-2v-7z"/><path d="M22 11.5a2.5 2.5 0 0 0-2.5-2.5h-5l1-4.5a2 2 0 0 0-3.9-.9L7 11v11h11.4a2 2 0 0 0 2-1.7l1.5-7.3a2.5 2.5 0 0 0 .1-1.5z"/></svg>
                  <span>{likes >= 1000 ? (likes / 1000).toFixed(1) + "k" : likes}</span>
                </button>
                <button className="icon-btn">{Ic.share}</button>
                <button className="icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M9 15v-6l5 3-5 3z"/><circle cx="12" cy="12" r="10"/></svg></button>
                <button className="icon-btn">{Ic.insta}</button>
              </div>
            </div>
          </div>

          <div className="art-image-main" style={{ aspectRatio: "16/10" }}>
            <div className={`pic poster-art ${a.art}`} />
            <div className="cap">FOTO · {a.cat.toUpperCase()} · KONBINI EDITORIAL</div>
          </div>

          <div className="art-body" style={{ maxWidth: "none" }}>
            <p>Konbini llegó al evento de prensa donde se reveló parte del contenido de <strong>{a.title}</strong>. Lo que vimos confirma lo que ya intuíamos: estamos frente a una pieza que va a marcar el año para la comunidad otaku chilena.</p>
            <p>Durante la sesión, los productores explicaron cómo abordaron la adaptación, qué cambios decidieron hacer y por qué eligieron Santiago como una de las primeras ciudades en Latinoamérica para el estreno simultáneo.</p>
            <h2>Detalles que no se vieron en el tráiler</h2>
            <p>La paleta de colores, el rediseño de algunos personajes secundarios y la banda sonora original — compuesta por un equipo japonés en colaboración con artistas locales — son los grandes diferenciadores. La animación, como siempre, está al nivel que la franquicia exige.</p>
            <blockquote>"Queríamos que esto se sintiera como una carta de amor para los fans que llevan años apoyando", contó el director durante la sesión.</blockquote>
            <h2>Qué viene</h2>
            <p>Las preventas comienzan la próxima semana y los lugares en sala IMAX son limitados. Si eres parte de la comunidad konbinera, ya sabes lo que hay que hacer.</p>
            <div className="tags-row">
              {(a.tags || []).map(t => <span key={t} className="pill" onClick={() => nav("tag", { tag: t })} style={{ cursor: "pointer" }}>#{t}</span>)}
            </div>

            <div style={{ marginTop: 36, padding: 28, border: "1px solid var(--line)", borderRadius: "var(--r-lg)", display: "flex", gap: 18, alignItems: "center", justifyContent: "space-between", flexWrap: "wrap" }}>
              <div>
                <div style={{ fontFamily: "var(--font-display)", fontSize: 22, letterSpacing: "-.01em", fontWeight: 700, marginBottom: 4 }}>{liked ? "Gracias por tu like" : "¿Te gustó este artículo?"}</div>
                <div style={{ color: "var(--ink-3)", fontSize: 13 }}>{likes} {likes === 1 ? "persona" : "personas"} le {likes === 1 ? "dio" : "dieron"} like</div>
              </div>
              <button onClick={toggleLike} className="btn primary lg" style={liked ? { background: "var(--accent)" } : { background: "var(--ink)", color: "var(--bg)" }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill={liked ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 22V11"/><path d="M2 13a2 2 0 0 1 2-2h3v11H4a2 2 0 0 1-2-2v-7z"/><path d="M22 11.5a2.5 2.5 0 0 0-2.5-2.5h-5l1-4.5a2 2 0 0 0-3.9-.9L7 11v11h11.4a2 2 0 0 0 2-1.7l1.5-7.3a2.5 2.5 0 0 0 .1-1.5z"/></svg>
                <span style={{ marginLeft: 6 }}>{liked ? "Te gustó" : "Me gusta"}</span>
              </button>
            </div>
          </div>
        </div>

        <aside className="art-side">
          {linkedEvent ? (
            <div>
              <div className="art-side-title">
                <span className="badge-link">EVENTO VINCULADO</span>
                <h4 style={{ margin: "8px 0 4px" }}>Asiste al evento</h4>
                <div className="sub">El organizador encargó este artículo a Konbini.</div>
              </div>
              <div onClick={() => nav("event", { id: linkedEvent.id })} style={{ cursor: "pointer", marginTop: 14 }}>
                <EventCard e={linkedEvent} />
              </div>
            </div>
          ) : null}

          <div className="blk" style={{ padding: linkedEvent ? "22px" : "0", background: linkedEvent ? "var(--surface)" : "transparent", border: linkedEvent ? "1px solid var(--line)" : 0 }}>
            <h4>Eventos relacionados</h4>
            <div className="sub">Misma categoría · próximos</div>
            <div style={{ marginTop: 8 }}>
              {orgRel.map(e => (
                <div key={e.id} className="mini-evt" onClick={() => nav("event", { id: e.id })}>
                  <div className="mt"><div className={`pic poster-art ${e.art}`} /></div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="nm">{e.title}</div>
                    <div className="dt">{e.date} · {e.place.split(",")[0]}</div>
                  </div>
                  <span style={{ color: "var(--ink-3)" }}>{Ic.arrow}</span>
                </div>
              ))}
            </div>
            <button className="btn ghost block" style={{ marginTop: 14 }} onClick={() => nav("category", { cat: a.cat.toLowerCase() })}>Ver más eventos de {a.cat} {Ic.arrow}</button>
          </div>
        </aside>
      </div>

      <div style={{ marginTop: 80 }}>
        <SectionHead title="Sigue leyendo" ja="次の記事" />
        <div className="card-grid">
          {moreArt.map(x => <ArticleCard key={x.id} a={x} onOpen={y => nav("article", { id: y.id })} />)}
        </div>
      </div>
    </main>
  );

        <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 16 }}>
          {reasons.map(r => (
            <label key={r.v} className="ck-row" onClick={() => setReason(r.v)} style={{ flexDirection: "column", alignItems: "stretch", padding: "12px 14px", gap: 4, background: reason === r.v ? "color-mix(in oklab, var(--accent) 8%, var(--surface-2))" : "var(--surface-2)", border: reason === r.v ? "1px solid var(--accent)" : "1px solid var(--line)", cursor: "pointer" }}>

                <span style={{ fontWeight: 600, fontSize: 14 }}>{r.l}</span>
              </div>
              <div style={{ paddingLeft: 26, color: "var(--ink-3)", fontSize: 12, lineHeight: 1.4 }}>{r.d}</div>
            </label>
          ))}
        </div>
        <div className="field" style={{ marginBottom: 16 }}>
          <label>Detalles adicionales {reason !== "other" && <span style={{ color: "var(--ink-3)", fontWeight: 400 }}>(opcional)</span>}{reason === "other" && <span style={{ color: "var(--err)" }}> *</span>}</label>
          <textarea value={details} onChange={ev => setDetails(ev.target.value)} placeholder="Cuéntanos más contexto si quieres ayudar a la revisión..." style={{ minHeight: 80 }} />

        <div style={{ fontSize: 11, color: "var(--ink-3)", marginBottom: 14, lineHeight: 1.5 }}>Para reportes de seguridad urgentes o ilegales: escríbenos directo a <a style={{ color: "var(--accent)" }}>abuso@konbini.cl</a>.</div>

          <button className="btn primary" style={{ background: "var(--warn)", color: "#14110d" }} disabled={!reason || (reason === "other" && !details.trim())} onClick={() => { onSubmit({ reason, details }); onClose(); }}>Enviar reporte</button>

      </div>
    </div>
  );
}

function CheckoutPage() {
  const { route, nav } = useRouter();
  const e = EVENTS.find(x => x.id === route.params?.id) || EVENTS[0];
  const [step, setStep] = useState(1);
  const [tiers, setTiers] = useState([
    { name: "General", desc: "Sala estándar · butaca libre", price: 9990, qty: 1 },
    { name: "3D Premium", desc: "Lentes incluidos · sala IMAX", price: 14990, qty: 0 },
    { name: "VIP · Combo", desc: "Reclinable + cabritas + bebida", price: 22990, qty: 0 },
  ]);
  const subtotal = tiers.reduce((s, t) => s + t.price * t.qty, 0);
  const fee = Math.round(subtotal * 0.06);
  const total = subtotal + fee;
  const fmt = n => n.toLocaleString("es-CL");
  const setQty = (i, d) => setTiers(tiers.map((t, j) => j === i ? { ...t, qty: Math.max(0, t.qty + d) } : t));
  const totalTickets = tiers.reduce((s, t) => s + t.qty, 0);

  // simulate gateway redirect
  useEffect(() => {
    if (step === 2) { const id = setTimeout(() => setStep(3), 2200); return () => clearTimeout(id); }
  }, [step]);

  return (
    <main className="container">
      <div className="ck-shell">
        <div className="ck-head">
          <div>
            <button className="btn ghost" style={{ fontSize: 12, padding: "6px 14px" }} onClick={() => nav("event", { id: e.id })}>{Ic.chevL} Volver al evento</button>

            <div style={{ color: "var(--ink-3)", fontSize: 14 }}>{e.title} · {e.date}</div>
          </div>
          <div className="ck-steps">
            <div className={`s ${step >= 1 ? "on" : ""} ${step > 1 ? "done" : ""}`}><span className="n">1</span> ENTRADAS</div>
            <div className="line" />
            <div className={`s ${step >= 2 ? "on" : ""} ${step > 2 ? "done" : ""}`}><span className="n">2</span> PAGO</div>
            <div className="line" />
            <div className={`s ${step >= 3 ? "on" : ""}`}><span className="n">3</span> CONFIRMACIÓN</div>

        </div>

        {step === 1 && (
          <div className="ck-grid">
            <div>
              <h2 className="display" style={{ fontSize: 22, marginTop: 0 }}>Selecciona tus entradas</h2>
              {tiers.map((t, i) => (
                <div key={i} className="ck-tier">
                  <div>
                    <div className="name">{t.name}</div>
                    <div className="desc">{t.desc}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 18 }}>
                    <div className="price">${fmt(t.price)}</div>
                    <div className="ck-qty">
                      <button onClick={() => setQty(i, -1)} disabled={t.qty === 0}>−</button>
                      <span className="v">{t.qty}</span>
                      <button onClick={() => setQty(i, +1)}>+</button>
                    </div>
                  </div>
                </div>
              ))}
              <div className="help" style={{ marginTop: 18, color: "var(--ink-3)", fontSize: 13, padding: 14, background: "var(--surface-2)", borderRadius: 10 }}>
                💡 El pago se procesará por nuestra <strong>pasarela segura</strong>. No solicitamos ni almacenamos datos de tu tarjeta.
              </div>
            </div>
            <aside className="ck-summary">
              <h3>Resumen</h3>
              {tiers.filter(t => t.qty > 0).map((t, i) => (
                <div key={i} className="sum-row">
                  <span>{t.name} × {t.qty}</span>
                  <span className="mono">${fmt(t.price * t.qty)}</span>
                </div>
              ))}
              {totalTickets === 0 && <div style={{ color: "var(--ink-3)", fontSize: 13, padding: "8px 0" }}>Agrega entradas para continuar.</div>}
              {totalTickets > 0 && <>
                <div className="sum-row">
                  <span style={{ color: "var(--ink-3)" }}>Subtotal</span>
                  <span className="mono">${fmt(subtotal)}</span>
                </div>
                <div className="sum-row">
                  <span style={{ color: "var(--ink-3)" }}>Servicio (6%)</span>
                  <span className="mono">${fmt(fee)}</span>
                </div>
                <div className="sum-row tot">
                  <span>Total</span>
                  <span>${fmt(total)}</span>
                </div>
              </>}
              <button className="btn primary block lg" disabled={totalTickets === 0} style={{ marginTop: 18, opacity: totalTickets === 0 ? .4 : 1 }} onClick={() => setStep(2)}>
                Continuar al pago {Ic.arrow}
              </button>
              <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--ink-3)", letterSpacing: ".1em", textAlign: "center", marginTop: 12 }}>
                🔒 PAGO SEGURO · SSL · 3D SECURE
              </div>
            </aside>
          </div>
        )}

        {step === 2 && (
          <div className="gateway-card">
            <div className="lock"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="11" width="16" height="11" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></svg></div>
            <h3>Redirigiendo a la pasarela…</h3>
            <p>Estamos llevándote a nuestro procesador de pago certificado. Tus datos están protegidos con cifrado de extremo a extremo.</p>
            <div style={{ position: "relative", margin: "20px auto", maxWidth: 280, height: 4, background: "rgba(255,255,255,.2)", borderRadius: 999, overflow: "hidden" }}>

            </div>
            <style>{`@keyframes load { from { transform: translateX(-100%); } to { transform: translateX(0); } }`}</style>
            <div className="gateway-logos">
              <span>WEBPAY+</span>
              <span>·</span>
              <span>MERCADO PAGO</span>
              <span>·</span>
              <span>STRIPE</span>
            </div>
          </div>
        )}

        {step === 3 && (
          <div className="ck-grid">
            <div className="ticket-result">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", gap: 18 }}>
                <div>
                  <div className="eyebrow" style={{ color: "var(--ok)" }}>✓ COMPRA CONFIRMADA</div>

                  <div style={{ color: "var(--ink-3)" }}>{e.date} · {e.place}</div>
                </div>
                <div className="qr-code" />
              </div>
              <div className="perf">
                <div className="cell"><div className="lbl">CÓDIGO</div><div className="val mono">KB-9F2A-71X</div></div>
                <div className="cell"><div className="lbl">ASISTENTE</div><div className="val">Edgardo Toro</div></div>
                <div className="cell"><div className="lbl">ENTRADAS</div><div className="val">{totalTickets || 1} tickets</div></div>
                <div className="cell"><div className="lbl">PAGADO</div><div className="val mono">${fmt(total || 9990)}</div></div>
              </div>
              <div style={{ display: "flex", gap: 10, marginTop: 18 }}>
                <button className="btn dark">Descargar PDF</button>
                <button className="btn ghost">Enviar a mi correo</button>
                <button className="btn ghost">Agregar al calendario</button>

            </div>
            <aside className="ck-summary">
              <h3>¿Qué sigue?</h3>

  const remove = id => setMsgs(arr => arr.filter(m => m.id !== id));

  const ic = k => ({ ok: { bg: "var(--ok)", g: "✓" }, err: { bg: "var(--err)", g: "✕" }, info: { bg: "var(--accent-3)", g: "i" }, invite: { bg: "var(--accent)", g: "✉" }, transfer: { bg: "var(--accent-2)", g: "⇄" } })[k];

    <div className="acc-section" style={{ padding: 8 }}>
      {shown.length === 0 ? (
        <div style={{ padding: 40, textAlign: "center", color: "var(--ink-3)" }}>Sin mensajes en este filtro.</div>
      ) : shown.map(m => {
        const icon = ic(m.kind);
        const hasActions = m.kind === "invite" || m.kind === "transfer";
        return (
          <div key={m.id} style={{ background: m.unread ? "color-mix(in oklab, var(--accent) 4%, transparent)" : "transparent", borderRadius: 10, padding: 14, marginBottom: 6, display: "flex", gap: 14, alignItems: "flex-start", borderLeft: hasActions ? "3px solid var(--accent)" : "3px solid transparent" }}>

            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 4, flexWrap: "wrap" }}>
                <span style={{ fontWeight: 600, fontSize: 14, color: "var(--ink)" }}>{m.t}</span>
                {hasActions && <span className="pill" style={{ fontSize: 10, padding: "2px 8px", color: "var(--accent)", borderColor: "color-mix(in oklab, var(--accent) 30%, transparent)", background: "color-mix(in oklab, var(--accent) 10%, transparent)" }}>REQUIERE ACCIÓN</span>}
                {m.unread && <span style={{ width: 8, height: 8, borderRadius: 999, background: "var(--accent)" }}></span>}
              </div>
              <div style={{ color: "var(--ink-2)", fontSize: 13, lineHeight: 1.55, marginBottom: m.motive ? 6 : 10 }}>{m.body}</div>
              {m.motive && <div style={{ background: "color-mix(in oklab, var(--err) 8%, var(--surface-2))", border: "1px solid color-mix(in oklab, var(--err) 25%, var(--line))", borderRadius: 8, padding: "8px 12px", marginBottom: 10, fontSize: 12, color: "var(--err)" }}><strong>Motivo:</strong> {m.motive}</div>}

              {/* INVITE actions */}
              {m.kind === "invite" && (
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <button className="btn primary" style={{ padding: "8px 16px", fontSize: 13, background: "var(--ok)" }} onClick={() => { toast.ok("Invitación aceptada", "Ya eres Member de Konbini Editorial"); markRead(m.id); remove(m.id); }}>✓ Aceptar invitación</button>
                  <button className="btn ghost" style={{ padding: "8px 16px", fontSize: 13 }} onClick={() => { toast.info("Invitación rechazada"); remove(m.id); }}>Rechazar</button>
                  <span style={{ fontSize: 11, color: "var(--ink-3)", marginLeft: "auto" }}>{m.time}</span>

              )}

              {/* TRANSFER actions */}
              {m.kind === "transfer" && (
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <button className="btn primary" style={{ padding: "8px 16px", fontSize: 13, background: "var(--ok)" }} onClick={() => { toast.ok("Transferencia aprobada", "El evento ahora es de Cinépolis Chile"); remove(m.id); }}>✓ Aprobar transferencia</button>

              {/* SIMPLE messages */}
              {!hasActions && (
                <div style={{ display: "flex", gap: 12, alignItems: "center", fontSize: 11, color: "var(--ink-3)" }}>
                  <span>{m.time}</span>
                  {m.unread && <button onClick={() => markRead(m.id)} style={{ color: "var(--accent)", fontSize: 12 }}>Marcar como leído</button>}
                  <button onClick={() => remove(m.id)} style={{ color: "var(--ink-3)", marginLeft: "auto" }}>Eliminar</button>
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  </>);
}

function ConfirmDialog({ title, message, danger = false, confirmLabel = "Confirmar", cancelLabel = "Cancelar", typeToConfirm, onConfirm, onClose }) {
  const [typed, setTyped] = useState("");
  const ok = !typeToConfirm || typed.trim().toUpperCase() === typeToConfirm.toUpperCase();
  return (
    <div className="confirm-bg" onClick={onClose}>
      <div className="confirm-card" onClick={e => e.stopPropagation()}>
        {danger && <div className="danger-ic"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg></div>}
        <h3 className="h">{title}</h3>
        <p className="p">{message}</p>
        {typeToConfirm && <>
          <p className="p" style={{ marginBottom: 8, fontSize: 12, color: "var(--ink-3)" }}>Para confirmar, escribe <strong style={{ color: "var(--err)" }}>{typeToConfirm}</strong> abajo:</p>
          <input className="danger-input" value={typed} onChange={e => setTyped(e.target.value)} autoFocus />
        </>}
        <div className="row-act">
          <button className="btn ghost" onClick={onClose}>{cancelLabel}</button>
          <button className={`btn ${danger ? "primary" : "dark"}`} style={ danger ? { background: "var(--err)", color: "#fff" } : null } onClick={ok ? onConfirm : null} disabled={!ok}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

function TagPage() {
  const { route, nav } = useRouter();
  const tag = route.params?.tag || "shonen";
  const [view, setView] = useState("grid");
  const [page, setPage] = useState(1);
  const [perPage, setPerPage] = useState(12);
  const [open, setOpen] = useState(null);
  const [sort, setSort] = useState("Más recientes");
  const [type, setType] = useState("Todos");
  const [sponsored, setSponsored] = useState("Todos");
  const [period, setPeriod] = useState(null);
  const [q, setQ] = useState("");
  const [searchOpen, setSearchOpen] = useState(false);

  const sorts = ["Más recientes", "Más leídas", "A-Z"];
  const types = ["Todos", "Artículos", "Entrevistas", "Reseñas"];
  const sponsoredOpts = ["Todos", "Editoriales", "Patrocinados"];

  const norm = s => (s || "").toLowerCase();
  const q0 = norm(tag);
  let articles = ARTICLES.filter(a => (a.tags || []).some(t => norm(t).includes(q0)) || norm(a.title).includes(q0) || norm(a.cat).includes(q0));
  if (sponsored === "Patrocinados") articles = articles.filter(a => a.sponsored);
  if (sponsored === "Editoriales") articles = articles.filter(a => !a.sponsored);
  if (q.trim()) articles = articles.filter(a => a.title.toLowerCase().includes(q.toLowerCase()));
  const allArticles = articles.length ? [...articles, ...articles, ...articles].slice(0, 9) : ARTICLES.slice(0, 6);
  const events = EVENTS.filter(e => norm(e.title).includes(q0) || norm(e.cat).includes(q0));

  const Pop = ({ id, label, options, value, onPick, icon, dflt }) => (
    <div style={{ position: "relative" }}>
      <button className={`sel ${open === id ? "on" : ""} ${value !== dflt ? "on" : ""}`} onClick={() => setOpen(open === id ? null : id)} title={label}>
        {icon}<strong style={{ fontWeight: 600 }}>{value}</strong> {Ic.chev}
      </button>
      {open === id && (
        <div className="menu" style={{ top: 44, left: 0, minWidth: 200 }} onMouseLeave={() => setOpen(null)}>
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: ".15em", color: "var(--ink-3)", textTransform: "uppercase", padding: "8px 12px 4px" }}>{label}</div>
          {options.map(o => (
            <button key={o} onClick={() => { onPick(o); setOpen(null); }} style={value === o ? { background: "var(--surface-2)", color: "var(--ink)" } : null}>
              {value === o && <span style={{ color: "var(--accent)", marginRight: 2 }}>✓</span>}
              {o}
            </button>
          ))}
        </div>
      )}
    </div>
  );

  const activeCount = (type !== "Todos" ? 1 : 0) + (sponsored !== "Todos" ? 1 : 0) + (period ? 1 : 0) + (q.trim() ? 1 : 0);
  const clearAll = () => { setType("Todos"); setSponsored("Todos"); setPeriod(null); setQ(""); };

  return (
    <main className="container">
      <a onClick={() => nav("news")} style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "var(--ink-3)", fontSize: 13, marginTop: 24, marginBottom: 4, cursor: "pointer" }}>{Ic.chevL} Volver a noticias</a>
      <div style={{ margin: "8px 0 36px" }}>
        <div className="eyebrow">TAG · タグ</div>
        <h1 className="display" style={{ fontSize: 80, margin: "12px 0 8px", letterSpacing: "-.035em", lineHeight: .95 }}>
          <span style={{ color: "var(--accent)", marginRight: 4 }}>#</span>{tag}
        </h1>
        <p style={{ color: "var(--ink-2)", margin: 0, maxWidth: "60ch", fontSize: 16 }}>
          <strong style={{ color: "var(--ink)" }}>{allArticles.length} artículos</strong> y <strong style={{ color: "var(--ink)" }}>{events.length} eventos</strong> etiquetados con <strong>#{tag}</strong>. Tags generados por IA al aprobar el contenido.
        </p>
      </div>

      <div className="fbar-sticky">
        <div className="fbar-inner">
          <div className="group">
            {["Hoy", "Esta semana"].map(p => (
              <button key={p} className={`sel ${period === p ? "on" : ""}`} onClick={() => setPeriod(period === p ? null : p)}>{p}</button>
            ))}
          </div>
          <div className="vline"></div>
          <div className="group">
            <Pop id="type" label="Tipo" options={types} value={type} onPick={setType} icon={<span style={{ display: "inline-flex", marginRight: 6 }}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 6h16M4 12h12M4 18h8"/></svg></span>} dflt="Todos" />
            <Pop id="sponsored" label="Origen" options={sponsoredOpts} value={sponsored} onPick={setSponsored} icon={<span style={{ display: "inline-flex", marginRight: 6, fontWeight: 700 }}>✦</span>} dflt="Todos" />
            {activeCount > 0 && <button className="sel" style={{ color: "var(--accent)" }} onClick={clearAll}>✕ Limpiar ({activeCount})</button>}
          </div>
          <div className="group" style={{ marginLeft: "auto" }}>
            <div style={{ position: "relative" }}>
              <button className={`sel ${searchOpen ? "on" : ""} ${q ? "on" : ""}`} onClick={() => setSearchOpen(o => !o)} title="Buscar">
                <span style={{ display: "inline-flex", marginRight: 6 }}>{Ic.search}</span>
                <strong style={{ fontWeight: 600 }}>{q || "Buscar"}</strong>
              </button>
              {searchOpen && (
                <div className="menu" style={{ top: 44, right: 0, left: "auto", minWidth: 280, padding: 12 }} onMouseLeave={() => setSearchOpen(false)}>
                  <div className="search-input" style={{ padding: "10px 14px", margin: 0 }}>
                    {Ic.search}
                    <input autoFocus placeholder={`Buscar en #${tag}…`} value={q} onChange={e => setQ(e.target.value)} style={{ padding: 0, background: "transparent" }} />
                    {q && <button onClick={() => setQ("")} className="icon-btn" style={{ width: 28, height: 28 }}>{Ic.close}</button>}
                  </div>
                </div>
              )}
            </div>
            <div style={{ display: "inline-flex", border: "1px solid var(--line)", borderRadius: 999, padding: 3, background: "var(--surface)" }}>
              <button className={`sel ${view === "grid" ? "on" : ""}`} onClick={() => setView("grid")} title="Grilla" style={{ border: 0, padding: "6px 10px" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              </button>
              <button className={`sel ${view === "list" ? "on" : ""}`} onClick={() => setView("list")} title="Lista" style={{ border: 0, padding: "6px 10px" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
              </button>
            </div>
            <Pop id="sort" label="Ordenar" options={sorts} value={sort} onPick={setSort} icon={<span style={{ display: "inline-flex", marginRight: 6 }}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 6h13M3 12h9M3 18h5M17 8V4l3 3M17 16v4l3-3"/></svg></span>} dflt="Más recientes" />
          </div>
        </div>
      </div>

      {view === "grid" ? (
        <div className="card-grid" style={{ marginBottom: 24 }}>
          {allArticles.map((a, i) => <ArticleCard key={`${a.id}-${i}`} a={a} onOpen={x => nav("article", { id: x.id })} />)}
        </div>
      ) : (
        <div className="list-grid">
          {allArticles.map((a, i) => (
            <div key={`${a.id}-${i}`} className="list-row" onClick={() => nav("article", { id: a.id })}>
              <div className="l-img">
                <div className={`pic poster-art ${a.art}`} />
                <span className="cat-tag">{a.cat.toUpperCase()}</span>
              </div>
              <div className="l-info">
                <div className="l-date">{a.date} · {a.reading} lectura</div>
                <h3 className="l-title">{a.title}</h3>
                <div className="l-place" style={{ color: "var(--ink-2)", fontSize: 14, marginBottom: 0 }}>{a.excerpt}</div>
              </div>
              <div></div>
              <span style={{ color: "var(--ink-3)" }}>{Ic.arrow}</span>
            </div>
          ))}
        </div>
      )}

      <div className="pag-bar">
        <div className="pag-info">
          <span>Mostrando <strong style={{ color: "var(--ink)" }}>{(page - 1) * perPage + 1}–{Math.min(page * perPage, allArticles.length * 3)}</strong> de <strong style={{ color: "var(--ink)" }}>{allArticles.length * 3}</strong> artículos</span>
          <span style={{ color: "var(--line-2)" }}>·</span>
          <span className="ips">
            <span>Mostrar</span>
            <select value={perPage} onChange={e => { setPerPage(+e.target.value); setPage(1); }}>
              <option value="12">12</option>
              <option value="24">24</option>
              <option value="48">48</option>
            </select>
            <span>por página</span>
          </span>
        </div>
        <div className="pag-pages">
          <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1} title="Anterior">{Ic.chevL}</button>
          {[1, 2, 3, 4].map(p => <button key={p} className={page === p ? "on" : ""} onClick={() => setPage(p)}>{p}</button>)}
          <span className="ell">…</span>
          <button onClick={() => setPage(p => p + 1)}>{Ic.chevR}</button>
        </div>
      </div>

      {events.length > 0 && (
        <section style={{ margin: "56px 0 60px" }}>
          <SectionHead title="Eventos relacionados" ja="関連イベント" moreLabel="Ver todos los eventos" onMore={() => nav("category", { cat: "anime" })} />
          <div className="card-grid">{events.slice(0, 4).map(e => <EventCard key={e.id} e={e} />)}</div>
        </section>
      )}
    </main>
  );
}

function AdminFormModal({ title, onClose, onSave, fields, initial = {} }) {
  const [data, setData] = useState(initial);
  const set = (k, v) => setData(d => ({ ...d, [k]: v }));
  return (
    <div className="confirm-bg" onClick={onClose}>
      <div className="confirm-card" onClick={e => e.stopPropagation()} style={{ maxWidth: 560 }}>
        <h3 className="h">{title}</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 14, marginBottom: 18 }}>
          {fields.map(f => (
            <div key={f.k} className="field" style={{ margin: 0 }}>
              <label>{f.label}{f.required && <span style={{ color: "var(--err)" }}> *</span>}</label>
              {f.type === "select" ? (
                <select value={data[f.k] || ""} onChange={e => set(f.k, e.target.value)}>
                  {f.options.map(o => <option key={o.v || o} value={o.v || o}>{o.l || o}</option>)}
                </select>
              ) : f.type === "textarea" ? (
                <textarea value={data[f.k] || ""} onChange={e => set(f.k, e.target.value)} placeholder={f.placeholder} />
              ) : f.prefix ? (
                <div className="input-prefix"><span>{f.prefix}</span><input type={f.type || "text"} value={data[f.k] || ""} onChange={e => set(f.k, e.target.value)} placeholder={f.placeholder} /></div>
              ) : (
                <input type={f.type || "text"} value={data[f.k] || ""} onChange={e => set(f.k, e.target.value)} placeholder={f.placeholder} />
              )}
              {f.help && <div className="help">{f.help}</div>}
            </div>
          ))}
        </div>
        <div className="row-act">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn dark" onClick={() => { onSave(data); onClose(); }}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

              <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: ".1em", color: "var(--ink-3)", padding: "3px 7px", borderRadius: 4, background: "var(--surface-2)" }}>{m.type === "org" ? "ORG" : "USUARIO"}</span>
            </div>
          ))}
        </div>
        <div className="row-act" style={{ marginTop: 18 }}>
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn dark" onClick={() => { onTransfer(picked); onClose(); }} disabled={!picked}>Transferir a {picked?.nm || "..."}</button>
        </div>
      </div>
    </div>
  );
}

/* ───────────────── markdown area + admin event form ───────────────── */
function MarkdownArea({ value, onChange, placeholder, minHeight = 140 }) {
  const insert = before => {
    onChange((value || "") + before);
  };
  return (
    <div className="md-editor">
      <div className="md-toolbar">
        <button title="Negrita" onClick={() => insert("**texto**")}><strong>B</strong></button>
        <button className="italic" title="Cursiva" onClick={() => insert("*texto*")}>I</button>
        <span className="sep"></span>
        <button title="Título 2" onClick={() => insert("\n## ")}>H2</button>
        <button title="Título 3" onClick={() => insert("\n### ")}>H3</button>
        <span className="sep"></span>
        <button title="Lista" onClick={() => insert("\n- ")}>≡</button>
        <button title="Lista numerada" onClick={() => insert("\n1. ")}>1.</button>
        <button title="Cita" onClick={() => insert("\n> ")}>"</button>
        <button title="Link" onClick={() => insert("[texto](https://)")}>🔗</button>
        <button title="Código" onClick={() => insert("`código`")}><span style={{ fontFamily: "var(--font-mono)" }}>{`</>`}</span></button>
        <span className="badge-md">MARKDOWN</span>
      </div>
      <textarea value={value || ""} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={{ minHeight }} />
    </div>
  );
}

function AccItem({ n, title, meta, open, onToggle, children }) {
  return (
    <div className={`form-acc-item ${open ? "open" : ""}`}>
      <div className="form-acc-head" onClick={onToggle}>
        <span className="num">{n}</span>
        <span className="ti">{title}</span>
        {meta && <span className="meta">{meta}</span>}
        <span className="chev">{Ic.chev}</span>
      </div>
      {open && <div className="form-acc-body">{children}</div>}
    </div>
  );
}

      </div>

      <div style={{ position: "sticky", bottom: 0, marginTop: 24, padding: "18px 0", borderTop: "1px solid var(--line)", background: "color-mix(in oklab, var(--bg) 92%, transparent)", backdropFilter: "blur(8px)", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>

        </div>
      </div>
    </div>
  );
}
